name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create, for example v0.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean
      draft:
        description: "Create the release as a draft"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run dist:win
            artifact: windows
            paths: |
              dist/*.exe
          - name: macOS
            os: macos-latest
            command: npm run dist:mac
            artifact: macos
            paths: |
              dist/*.dmg
          - name: Linux
            os: ubuntu-latest
            command: npm run dist:linux
            artifact: linux
            paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.pacman

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.name }}
        run: ${{ matrix.command }}

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
        run: |
          args=()
          if [ "$DRAFT" = "true" ]; then
            args+=(--draft)
          fi
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            args+=(--target "$GITHUB_SHA")
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-artifacts/* --clobber
          else
            gh release create "$TAG_NAME" release-artifacts/* \
              --title "$TAG_NAME" \
              --generate-notes \
              "${args[@]}"
          fi
